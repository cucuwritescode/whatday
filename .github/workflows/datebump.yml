name: datebump

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: configure git identity
        run: |
          git config user.name "cucuwritescode"
          git config user.email "anicsounds@gmail.com"

      - name: compile
        run: clang -Wall -Wextra -O2 datebump.c -o datebump

      - name: run
        run: ./datebump
